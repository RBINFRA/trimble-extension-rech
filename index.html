<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Extension de recherche Mensura</title>
  <link rel="preconnect" href="https://components.connect.trimble.com" />
  <script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js" defer></script>
  <script src="app.js" defer></script>
  <style>
    :root {
      --primary: #1c4c96;
      --primary-dark: #163c78;
      --primary-light: #eaf1ff;
      --primary-rgb: 28, 76, 150;
      --primary-shadow-15: rgba(28, 76, 150, 0.15);
      --primary-shadow-35: rgba(28, 76, 150, 0.35);
      --accent: #529898;
      --border: #d3dde3;
      --surface: #f1f4f7;
      --text: #1f2a3a;
      --muted: #6b7785;
      --input-bg: #eef2f4;
      --input-text: #2e3a47;
      --input-focus-bg: #f8fbfb;
      --summary-bg: #f6fafb;
      --summary-text: #243345;
      --summary-hover-bg: #e7f0f0;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background: var(--surface);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      background: var(--surface);
    }

    header {
      background: var(--primary);
      color: white;
      padding: 16px 22px;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.2px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.12);
      position: sticky;
      top: 0;
      z-index: 2;
    }

    .app-layout {
      padding: 18px 18px 24px;
      max-width: 1180px;
      margin: 0 auto;
    }

    main {
      min-width: 0;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 18px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      border: 1px solid var(--border);
      margin-bottom: 14px;
    }

    .grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--accent);
      font-size: 14px;
    }

    input[type="text"],
    input[type="date"],
    select {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      background: var(--input-bg);
      color: var(--input-text);
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    input[type="text"]:focus,
    input[type="date"]:focus,
    select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px var(--primary-shadow-15);
      background: var(--input-focus-bg);
    }

    select.placeholder {
      color: var(--muted);
    }
    select.selected {
      color: var(--primary-dark);
      font-weight: 600;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 11px 16px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.08s ease, box-shadow 0.15s ease;
      font-weight: 600;
    }

    button.primary {
      background: var(--primary);
      color: white;
      box-shadow: 0 2px 6px var(--primary-shadow-35);
    }

    button.primary:hover {
      background: var(--primary-dark);
    }

    button.secondary {
      background: var(--input-bg);
      color: var(--input-text);
      border: 1px solid var(--border);
    }

    button:active {
      transform: translateY(1px);
    }

    .status {
      font-size: 14px;
      color: var(--primary);
      margin-top: 8px;
    }

    .loading-progress {
      width: 100%;
      background: #e5e7eb;
      border-radius: 8px;
      height: 10px;
      overflow: hidden;
      margin-top: 6px;
      border: 1px solid var(--border);
    }

    .loading-progress .progress-bar {
      height: 100%;
      width: 0;
      background: var(--primary);
      transition: width 0.2s ease;
    }

    .loading-gif {
      display: block;
      width: 70px;
      max-width: 80%;
      margin: 10px auto 0;
    }

    .progress-text {
      font-size: 12px;
      color: #4b5563;
      margin-top: 4px;
    }

    .hidden {
      display: none;
    }

    .results {
      margin-top: 12px;
    }

    .results h3 {
      margin: 0 0 8px 0;
      font-size: 16px;
      color: var(--accent);
    }

    #resultCount {
      font-size: 14px;
      margin-bottom: 10px;
      color: var(--muted);
    }

    .summary-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .summary-list li {
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--summary-bg);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      color: var(--summary-text);
    }

    .summary-list li.summary-section-title {
      background: var(--primary-light);
      color: var(--primary);
      font-weight: 700;
      text-transform: uppercase;
      justify-content: flex-start;
      gap: 8px;
      letter-spacing: 0.2px;
      border-color: var(--primary);
    }

    .summary-section-title .summary-item-text {
      color: inherit;
    }

    .summary-clickable {
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    .summary-clickable:hover {
      background: var(--summary-hover-bg);
      border-color: var(--primary);
    }

    .summary-item-text {
      display: block;
      width: 100%;
    }

    .badge {
      background: var(--primary);
      color: white;
      border-radius: 999px;
      padding: 2px 10px;
      font-weight: 600;
      font-size: 12px;
    }

    .error {
      color: #c53030;
      font-size: 14px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <header>Recherche d'objet 3D par attributs</header>
  <div class="app-layout">
    <main>
      <section class="card">
        <div class="grid">
          <div>
            <label for="nomProjet">Nom projet</label>
            <select id="nomProjet">
              <option value="">-- Sélectionner --</option>
            </select>
          </div>
          <div>
            <label for="element">Élément</label>
            <select id="element">
              <option value="">-- Sélectionner --</option>
            </select>
          </div>
          <div>
            <label for="localisation">Localisation</label>
            <select id="localisation">
              <option value="">-- Sélectionner --</option>
            </select>
          </div>

          <div>
            <label for="source">Source</label>
            <select id="source">
              <option value="">-- Sélectionner --</option>
            </select>
          </div>
          <div>
            <label for="entreprise">Entreprise d'exécution</label>
            <select id="entreprise">
              <option value="">-- Sélectionner --</option>
            </select>
          </div>
          <div>
            <label for="dateMin">Date (début)</label>
            <input id="dateMin" type="date" />
          </div>
          <div>
            <label for="dateMax">Date (fin)</label>
            <input id="dateMax" type="date" />
          </div>
        </div>
        <div class="actions">
          <button class="primary" id="searchBtn">Lancer la recherche</button>
          <button class="secondary" id="resetBtn">Réinitialiser</button>
        </div>
        <div id="status" class="status"></div>
        <img id="loadingSpinner" class="loading-gif hidden" src="GIF_INFRA.gif" alt="Chargement en cours" />
        <div id="loadingProgress" class="loading-progress hidden">
          <div id="loadingProgressBar" class="progress-bar"></div>
        </div>
        <div id="loadingProgressText" class="progress-text hidden"></div>
        <div id="error" class="error"></div>
      </section>

      <section class="card results">
        <h3>Résultats</h3>
        <div id="resultCount">Aucun résultat pour le moment.</div>
        <ul id="summary" class="summary-list"></ul>
      </section>
    </main>
  </div>
</body>
</html>
